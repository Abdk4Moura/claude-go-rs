name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }} (${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-go-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-go-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: claude-go-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claude-go-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          # We use `cross` for the actual build (separate step
          # below). This step is here for the case where a future
          # caller wants a plain cross build.
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (release)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }} --locked
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          # Per-target build dir so aarch64 and x86_64 don't share
          # the same `target/` (otherwise object files get
          # cross-linked and rust-lld fails).
          CARGO_TARGET_DIR: target-${{ matrix.target }}

      # `cross` runs the aarch64 build inside a Debian arm64v8
      # container with the right gcc + linker. This avoids the
      # host/guest object-file cross-contamination that happens
      # when ring's build.rs uses the host's cc.
      - name: Build (release) [aarch64-linux via cross]
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          cargo install cross --locked
          cross build --release --target aarch64-unknown-linux-gnu --locked
        env:
          CARGO_TARGET_DIR: target-aarch64-unknown-linux-gnu

      - name: Stage binary
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cp target-${{ matrix.target }}/${{ matrix.target }}/release/claude-go dist/${{ matrix.artifact }}
          else
            cp target-${{ matrix.target }}/${{ matrix.target }}/release/claude-go dist/${{ matrix.artifact }}
          fi
          (cd dist && sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    name: cut release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/claude-go-*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
