name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }} (${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-go-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claude-go-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: claude-go-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claude-go-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }} --locked
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          # Per-target build dir so aarch64 and x86_64 don't share
          # the same `target/` (otherwise object files get
          # cross-linked and rust-lld fails).
          CARGO_TARGET_DIR: target-${{ matrix.target }}
          # ring cross-compile: use pre-generated assembly instead
          # of compiling from C. This avoids the cc/cc-rs issue
          # where the host compiler produces x86_64 objects for
          # the aarch64 target.
          RING_PREGENERATE_ASM: 1

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target-${{ matrix.target }}/${{ matrix.target }}/release/claude-go dist/${{ matrix.artifact }}
          (cd dist && sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    name: cut release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/claude-go-*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
